
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sports Mart | Admin Login</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800&family=Barlow+Condensed:wght@600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>

:root{

--primary:#DCC85A;
--primary-light:#E8D773;
--surface:#F4E6A2;
--surface2:#F8F0C6;

--black:#111111;

--accent:#B74A38;

--text:#111111;

--muted:#62583F;

--radius:24px;

}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:Barlow,sans-serif;

min-height:100vh;

display:flex;

align-items:center;

justify-content:center;

background:

radial-gradient(circle at top left,rgba(255,255,255,.35),transparent 30%),

radial-gradient(circle at bottom right,rgba(183,74,56,.12),transparent 25%),

linear-gradient(180deg,#DCC85A,#E7D56B,#F2E08A);

padding:30px;

}

.card{

width:100%;

max-width:430px;

background:rgba(255,250,225,.85);

backdrop-filter:blur(16px);

border:1px solid rgba(17,17,17,.08);

border-radius:28px;

padding:42px;

box-shadow:

0 30px 80px rgba(0,0,0,.15);

}

.logo{

width:90px;

height:90px;

margin:auto;

border-radius:22px;

background:#111;

display:flex;

align-items:center;

justify-content:center;

color:#F4E6A2;

font-size:34px;

font-weight:900;

margin-bottom:25px;

}

h1{

font-family:"Barlow Condensed",sans-serif;

font-size:44px;

letter-spacing:2px;

text-transform:uppercase;

text-align:center;

color:#111;

}

.subtitle{

margin-top:8px;

text-align:center;

font-size:13px;

font-family:"Space Mono",monospace;

letter-spacing:2px;

text-transform:uppercase;

color:#7A6D4A;

margin-bottom:35px;

}

label{

display:block;

font-size:12px;

letter-spacing:2px;

text-transform:uppercase;

font-family:"Space Mono",monospace;

margin-bottom:10px;

color:#6A5D3F;

}

input{

width:100%;

padding:16px;

border-radius:16px;

border:1px solid rgba(17,17,17,.12);

background:#FFF9DE;

outline:none;

font-size:15px;

transition:.25s;

}

input:focus{

border-color:#111;

box-shadow:0 0 0 4px rgba(183,74,56,.12);

}

button{

margin-top:28px;

width:100%;

padding:16px;

border:none;

border-radius:18px;

background:#111;

color:#F4E6A2;

font-family:"Barlow Condensed",sans-serif;

font-size:20px;

font-weight:800;

letter-spacing:2px;

cursor:pointer;

transition:.25s;

}

button:hover{

transform:translateY(-2px);

background:#222;

}

#error{

margin-top:18px;

text-align:center;

font-size:14px;

color:#B74A38;

font-weight:600;

display:none;

}

.footer{

margin-top:32px;

text-align:center;

font-size:12px;

color:#7A6D4A;

}

</style>

</head>

<body>

<div class="card">

<div class="logo">

SM

</div>

<h1>

SPORTS MART

</h1>

<div class="subtitle">

ADMIN PORTAL

</div>

<label>

Password

</label>

<input

type="password"

id="password"

placeholder="Enter admin password"

autocomplete="off"

>

<button onclick="login()">

LOGIN

</button>

<div id="error">

Invalid Password

</div>

<div class="footer">

Sports Mart Premium Dashboard

</div>

</div>

<script>

const ADMIN_HASH="f935b54521504a3148e6c33ed57167e01b7f21c394b804cc7cadf3c2f0a23a25";

async function sha256(text){

const buffer=new TextEncoder().encode(text);

const digest=await crypto.subtle.digest("SHA-256",buffer);

return [...new Uint8Array(digest)]

.map(x=>x.toString(16).padStart(2,"0"))

.join("");

}

async function login(){

const password=document.getElementById("password").value;

const hash=await sha256(password);

if(hash===ADMIN_HASH){

sessionStorage.setItem(

"sportsmart_admin",

"authenticated"

);

window.location.href="sportsmart_admin.html";

return;

}

document.getElementById("error").style.display="block";

}

document.getElementById("password")

.addEventListener("keydown",e=>{

if(e.key==="Enter"){

login();

}

});

if(sessionStorage.getItem("sportsmart_admin")){

window.location.href="sportsmart_admin.html";

}

</script>

</body>
</html>
